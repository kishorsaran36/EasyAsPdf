<svg width="100%" height="100%" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Gradient for the back page (indigo-purple) -->
      <linearGradient id="back-page-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3B82F6" />
        <stop offset="100%" stop-color="#8B5CF6" />
      </linearGradient>

      <!-- Gradient for the front page folded corner -->
      <linearGradient id="fold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#E2E8F0" />
        <stop offset="100%" stop-color="#94A3B8" />
      </linearGradient>

      <!-- Gradient for the swoosh (cyan-emerald) -->
      <linearGradient id="swoosh-grad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#06B6D4" />
        <stop offset="100%" stop-color="#10B981" />
      </linearGradient>

      <!-- Smooth shadow for depth -->
      <filter id="logo-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15" flood-color="#0F172A" />
      </filter>

      <!-- Glow filter for the swoosh -->
      <filter id="swoosh-glow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3" flood-color="#10B981" />
      </filter>
      
      <!-- Base canvas shadow -->
      <filter id="canvas-shadow" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1" flood-color="#000000" />
      </filter>
    </defs>

    <!-- White Base Canvas for Favicon Visibility in Dark Mode Tabs -->
    <rect width="120" height="120" rx="26" fill="#ffffff" filter="url(#canvas-shadow)"/>
    <rect width="116" height="116" x="2" y="2" rx="24" fill="none" stroke="#F1F5F9" stroke-width="1.5" />

    <!-- Back Page (Rotated, representing document stack) -->
    <rect x="24" y="24" width="62" height="76" rx="10" fill="url(#back-page-grad)" transform="rotate(-6 55 62)" filter="url(#logo-shadow)" />

    <!-- Front Page (Standard shape, representing main document) -->
    <g filter="url(#logo-shadow)">
      <!-- Main Page body with folded corner cut out -->
      <path d="M 36,30 A 10,10 0 0 1 46,20 H 76 L 94,38 V 84 A 10,10 0 0 1 84,94 H 46 A 10,10 0 0 1 36,84 Z" fill="#FFFFFF" />
      <!-- Subtle internal border for a crisp look -->
      <path d="M 36,30 A 10,10 0 0 1 46,20 H 76 L 94,38 V 84 A 10,10 0 0 1 84,94 H 46 A 10,10 0 0 1 36,84 Z" fill="none" stroke="#E2E8F0" stroke-width="1.5" />
      
      <!-- Rounded folded flap -->
      <path d="M 76,20 V 29 A 9,9 0 0 0 85,38 H 94 Z" fill="url(#fold-grad)" />
    </g>

    <!-- Stylized "PDF" text inside the front page -->
    <g stroke="#0F172A" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- P -->
      <path d="M 43,68 V 48 H 50 C 54.5,48 54.5,57 50,57 H 43" />
      <!-- D -->
      <path d="M 58,48 V 68 H 62 C 67.5,68 67.5,48 62,48 H 58" />
      <!-- F -->
      <path d="M 74,68 V 48 H 82 M 74,57 H 79" />
    </g>

    <!-- Dynamic Speed Swoosh Arrow (wrapping around the page) -->
    <g filter="url(#swoosh-glow)">
      <path d="M 18,78 C 28,92 52,98 72,92 C 86,88 98,76 104,62" stroke="url(#swoosh-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <!-- Arrow Head pointing up-right -->
      <path d="M 96,65 L 104,62 L 102,71" stroke="url(#swoosh-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </g>
</svg>
